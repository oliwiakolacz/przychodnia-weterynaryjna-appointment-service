spring:
  datasource:
    url: jdbc:h2:mem:appointments;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  kafka:
    bootstrap-servers: localhost:9092
appointment:
  slot:
    hold-duration: PT5M
    cleanup-interval: PT1H   # w testach scheduler praktycznie nie odpala
